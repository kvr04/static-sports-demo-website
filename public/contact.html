<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Learn Sport</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

    <div class="logo">
        Sports AI
    </div>

    <nav>

        <a href="index.html">Home</a>
        <a href="contact.html">Learn Sport</a>

    </nav>

</header>

<div class="form-container">

    <h1>
        Join Sports Academy
    </h1>

    <form id="sportForm">

        <input
            type="text"
            id="name"
            placeholder="Enter Name"
            required>

        <input
            type="number"
            id="age"
            placeholder="Enter Age"
            required>

        <input
            type="number"
            id="weight"
            placeholder="Enter Weight"
            required>

        <select id="sport">

            <option>Football</option>
            <option>Cricket</option>
            <option>Basketball</option>
            <option>Tennis</option>

        </select>

        <input
            type="text"
            id="timing"
            placeholder="Preferred Timing">

        <button
            type="submit"
        id="submitBtn">

            <span id="btnText">
                Join Academy
            </span>

            <span id="loader"
                class="loader hidden">
            </span>

        </button>

    </form>

</div>

<script src="js/script.js"></script>

</body>

</html>
